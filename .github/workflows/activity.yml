name: Update Recent Activity

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-activity:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate recent activity
        uses: jamesgeorge007/github-activity-readme@master
        with:
          COMMIT_MSG: "chore(activity): update recent activity [skip ci]"
          MAX_LINES: 10
          AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config --global user.email "khairulislamtushar33@gmail.com"
          git config --global user.name "Ki6uiPar1na"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "chore(activity): update recent activity [skip ci]"
          git push
