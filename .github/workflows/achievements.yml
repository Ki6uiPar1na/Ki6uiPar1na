name: Update Achievements & Trophies

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  achievements:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Trophies SVG
        run: |
          mkdir -p assets/badges
          curl -L "https://github-profile-trophy.vercel.app/?username=${{ github.repository_owner }}&theme=matrix&row=2&column=4&margin-w=15&margin-h=15" -o assets/badges/trophies.svg

      - name: Generate Profile Summary
        run: |
          curl -L "https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=${{ github.repository_owner }}&theme=dark" -o assets/badges/profile-summary.svg
          curl -L "https://github-profile-summary-cards.vercel.app/api/cards/repos-per-language?username=${{ github.repository_owner }}&theme=dark" -o assets/badges/repos-per-language.svg
          curl -L "https://github-profile-summary-cards.vercel.app/api/cards/most-commit-language?username=${{ github.repository_owner }}&theme=dark" -o assets/badges/most-commit-language.svg

      - name: Commit updated badges
        run: |
          git config --global user.email "khairulislamtushar33@gmail.com"
          git config --global user.name "Ki6uiPar1na"
          git add assets/badges/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore(badges): update achievement badges [skip ci]"
          git push
