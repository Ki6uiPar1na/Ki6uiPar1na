name: Achievements

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p assets/badges
          curl -L "https://github-profile-trophy.vercel.app/?username=${{ github.repository_owner }}&theme=flat&no-frame=true" -o assets/badges/trophies.svg
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "update achievement badges"
