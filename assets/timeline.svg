<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff41"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="#0a0a0a" rx="12"/>
  <rect width="900" height="500" rx="12" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.2"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="18" font-weight="bold" filter="url(#glow)">[ CTF COMPETITION TIMELINE ]</text>

  <!-- Timeline line -->
  <line x1="80" y1="80" x2="80" y2="470" stroke="url(#lineGrad)" stroke-width="2" filter="url(#glow)"/>

  <!-- Event 1: National Robo Fest -->
  <circle cx="80" cy="110" r="6" fill="#00ff41" filter="url(#glow)"/>
  <rect x="105" y="95" width="280" height="30" rx="4" fill="#0d1a0d" stroke="#00ff41" stroke-width="0.5"/>
  <text x="115" y="114" fill="#00ff41" font-family="monospace" font-size="11" font-weight="bold">🏆 National Robo Fest CTF 2026</text>
  <text x="395" y="114" fill="#ffd700" font-family="monospace" font-size="10">Champion</text>

  <!-- Event 2: HackerOne -->
  <circle cx="80" cy="170" r="6" fill="#00d4ff" filter="url(#glow)"/>
  <rect x="105" y="155" width="280" height="30" rx="4" fill="#001520" stroke="#00d4ff" stroke-width="0.5"/>
  <text x="115" y="174" fill="#00d4ff" font-family="monospace" font-size="11" font-weight="bold">💰 HackerOne Bug Hunt 2026</text>
  <text x="395" y="174" fill="#00d4ff" font-family="monospace" font-size="10">11th + Bounty</text>

  <!-- Event 3: Black Hat CTF -->
  <circle cx="80" cy="230" r="6" fill="#00ff41" filter="url(#glow)"/>
  <rect x="105" y="215" width="280" height="30" rx="4" fill="#0d1a0d" stroke="#00ff41" stroke-width="0.5"/>
  <text x="115" y="234" fill="#00ff41" font-family="monospace" font-size="11" font-weight="bold">🌍 Black Hat CTF</text>
  <text x="395" y="234" fill="#00ff41" font-family="monospace" font-size="10">Top 100 Worldwide</text>

  <!-- Event 4: Cisco National Skills -->
  <circle cx="80" cy="290" r="6" fill="#00d4ff" filter="url(#glow)"/>
  <rect x="105" y="275" width="280" height="30" rx="4" fill="#001520" stroke="#00d4ff" stroke-width="0.5"/>
  <text x="115" y="294" fill="#00d4ff" font-family="monospace" font-size="11" font-weight="bold">📡 Cisco National Skills</text>
  <text x="395" y="294" fill="#00d4ff" font-family="monospace" font-size="10">5th Place</text>

  <!-- Event 5: Red Sentry -->
  <circle cx="80" cy="350" r="6" fill="#00ff41" filter="url(#glow)"/>
  <rect x="105" y="335" width="280" height="30" rx="4" fill="#0d1a0d" stroke="#00ff41" stroke-width="0.5"/>
  <text x="115" y="354" fill="#00ff41" font-family="monospace" font-size="11" font-weight="bold">🔴 Red Sentry CTF</text>
  <text x="395" y="354" fill="#00ff41" font-family="monospace" font-size="10">5th Place</text>

  <!-- Event 6: Cyber Invasion -->
  <circle cx="80" cy="410" r="6" fill="#00d4ff" filter="url(#glow)"/>
  <rect x="105" y="395" width="280" height="30" rx="4" fill="#001520" stroke="#00d4ff" stroke-width="0.5"/>
  <text x="115" y="414" fill="#00d4ff" font-family="monospace" font-size="11" font-weight="bold">💀 Cyber Invasion CTF</text>
  <text x="395" y="414" fill="#00d4ff" font-family="monospace" font-size="10">7th Place</text>

  <!-- Right side: Stats summary -->
  <g transform="translate(500, 90)">
    <text x="0" y="0" fill="#565656" font-family="monospace" font-size="11">[ ACHIEVEMENT STATS ]</text>

    <rect x="0" y="20" width="340" height="90" rx="6" fill="none" stroke="#00ff41" stroke-width="0.3" opacity="0.3"/>
    <text x="20" y="45" fill="#888" font-family="monospace" font-size="10">Total CTFs Participated:</text>
    <text x="280" y="45" fill="#00ff41" font-family="monospace" font-size="12" font-weight="bold">20+</text>
    <text x="20" y="65" fill="#888" font-family="monospace" font-size="10">Awards &amp; Recognitions:</text>
    <text x="280" y="65" fill="#00ff41" font-family="monospace" font-size="12" font-weight="bold">12+</text>
    <text x="20" y="85" fill="#888" font-family="monospace" font-size="10">Bounties Earned:</text>
    <text x="280" y="85" fill="#ffd700" font-family="monospace" font-size="12" font-weight="bold">$1,500+</text>

    <!-- National flag -->
    <text x="0" y="125" fill="#565656" font-family="monospace" font-size="11">[ REPRESENTING ]</text>
    <rect x="0" y="140" width="340" height="30" rx="4" fill="#0d1a0d" stroke="#00ff41" stroke-width="0.3"/>
    <text x="170" y="159" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="11">🇧🇩 Bangladesh — National CTF Champion</text>
  </g>
</svg>
