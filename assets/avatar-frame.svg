<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff41"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="hexClip">
      <polygon points="100,10 178,60 178,160 100,210 22,160 22,60"/>
    </clipPath>
  </defs>

  <!-- Outer hexagon glow -->
  <polygon points="100,5 183,57 183,163 100,215 17,163 17,57" fill="none" stroke="#00ff41" stroke-width="2" opacity="0.3" filter="url(#neonGlow)"/>

  <!-- Main hexagon frame -->
  <polygon points="100,10 178,60 178,160 100,210 22,160 22,60" fill="#0a0a0a" stroke="url(#grad1)" stroke-width="2.5"/>

  <!-- Inner hexagon -->
  <polygon points="100,20 168,65 168,155 100,200 32,155 32,65" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.4"/>

  <!-- Avatar placeholder (hexagonal) -->
  <g clip-path="url(#hexClip)">
    <!-- Dark background inside -->
    <polygon points="100,10 178,60 178,160 100,210 22,160 22,60" fill="#0d1a0d"/>
    <!-- Grid inside -->
    <g opacity="0.1" stroke="#00ff41" stroke-width="0.3">
      <line x1="22" y1="60" x2="178" y2="60"/>
      <line x1="22" y1="110" x2="178" y2="110"/>
      <line x1="22" y1="160" x2="178" y2="160"/>
      <line x1="60" y1="10" x2="60" y2="210"/>
      <line x1="100" y1="10" x2="100" y2="210"/>
      <line x1="140" y1="10" x2="140" y2="210"/>
    </g>
    <!-- Initials -->
    <text x="100" y="125" text-anchor="middle" fill="#00ff41" font-family="monospace" font-size="40" font-weight="bold" filter="url(#neonGlow)">KI</text>
  </g>

  <!-- Scanning line animation -->
  <rect x="22" y="10" width="156" height="2" fill="#00ff41" opacity="0.6" filter="url(#neonGlow)">
    <animate attributeName="y" from="10" to="200" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner accents -->
  <g fill="#00ff41" opacity="0.8">
    <circle cx="22" cy="60" r="2"/>
    <circle cx="178" cy="60" r="2"/>
    <circle cx="22" cy="160" r="2"/>
    <circle cx="178" cy="160" r="2"/>
    <circle cx="100" cy="10" r="2"/>
    <circle cx="100" cy="210" r="2"/>
  </g>

  <!-- Small decorative hexagons -->
  <g opacity="0.2" stroke="#00d4ff" stroke-width="0.5" fill="none">
    <polygon points="100,45 115,52.5 115,67.5 100,75 85,67.5 85,52.5"/>
    <polygon points="100,145 115,152.5 115,167.5 100,175 85,167.5 85,152.5"/>
  </g>
</svg>
