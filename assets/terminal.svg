<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="800" height="180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b26"/>
      <stop offset="100%" style="stop-color:#0f0f16"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Terminal window -->
  <rect x="0" y="0" width="800" height="180" rx="8" fill="url(#bgGrad)" stroke="#00ff41" stroke-width="1" opacity="0.95"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="800" height="32" rx="8" fill="#1e1e2e"/>
  <rect x="0" y="24" width="800" height="8" fill="#1e1e2e"/>

  <!-- Window buttons -->
  <circle cx="16" cy="16" r="5" fill="#ff5f56"/>
  <circle cx="36" cy="16" r="5" fill="#ffbd2e"/>
  <circle cx="56" cy="16" r="5" fill="#27c93f"/>

  <!-- Terminal title -->
  <text x="400" y="20" text-anchor="middle" fill="#565656" font-family="monospace" font-size="10">khairul@cyber:~ — zsh (matrix theme)</text>

  <!-- Terminal content -->
  <text x="20" y="55" fill="#565656" font-family="monospace" font-size="12">Last login: Sat Jul  4 12:00:00 2026</text>

  <!-- Prompt line 1 -->
  <text x="20" y="78" fill="#00ff41" font-family="monospace" font-size="12" filter="url(#glow)">┌──(</text>
  <text x="55" y="78" fill="#00d4ff" font-family="monospace" font-size="12">khairul</text>
  <text x="103" y="78" fill="#ff79c6" font-family="monospace" font-size="12">㉿</text>
  <text x="115" y="78" fill="#00d4ff" font-family="monospace" font-size="12">kali</text>
  <text x="135" y="78" fill="#00ff41" font-family="monospace" font-size="12">)-[</text>
  <text x="155" y="78" fill="#ffd700" font-family="monospace" font-size="12">~/profile</text>
  <text x="210" y="78" fill="#00ff41" font-family="monospace" font-size="12">]</text>

  <!-- Prompt line 2 -->
  <text x="20" y="100" fill="#00ff41" font-family="monospace" font-size="12" filter="url(#glow)">└─$</text>
  <text x="50" y="100" fill="#565656" font-family="monospace" font-size="12">cat /home/khairul/welcome.txt</text>

  <!-- Command output -->
  <text x="20" y="125" fill="#00ff41" font-family="monospace" font-size="13" font-weight="bold" filter="url(#glow)">
    &gt; Welcome to my GitHub Profile!
  </text>
  <text x="20" y="148" fill="#00d4ff" font-family="monospace" font-size="11">
    &gt; Cybersecurity Researcher | CTF Player | Competitive Programmer
  </text>

  <!-- Blinking cursor -->
  <rect x="415" y="152" width="2" height="14" fill="#00ff41">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
